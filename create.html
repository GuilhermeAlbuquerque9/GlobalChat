<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Criar tópico - GlobalChat</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/GlobalChat_logo.png">
</head>
<body>

    <header class="header">

        <h1 class="logoTitle">

            <img
                src="img/GlobalChat_logo.png"
                alt="GlobalChat"
                class="logo"
            >

            <span>GlobalChat</span>

        </h1>

        <p>Criar novo tópico</p>

    </header>

    <main class="container">

        <section class="formBox">

            <form id="createTopicForm">

                <label for="title">
                    Título
                </label>

                <input
                    type="text"
                    id="title"
                    maxlength="50"
                    required
                >

                <label for="description">
                    Descrição
                </label>

                <textarea
                    id="description"
                    rows="4"
                    maxlength="300"
                    required
                ></textarea>

                <label for="age">
                    Idade mínima
                </label>

                <select id="age">

                    <option value="0">Livre</option>
                    <option value="10">10+</option>
                    <option value="12">12+</option>
                    <option value="14">14+</option>
                    <option value="16">16+</option>
                    <option value="18">18+</option>

                </select>

                <div class="buttons">

                    <button
                        type="submit"
                        class="button"
                    >
                        Criar tópico
                    </button>

                    <a
                        href="index.html"
                        class="button secondary"
                    >
                        Cancelar
                    </a>

                </div>

            </form>

        </section>

    </main>

    <footer>
        <a href="index.html">
            ← Voltar
        </a>
    </footer>

    <script type="module" src="js/create.js"></script>

</body>
</html>
